apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: cir-uploads}
spec:
  accessModes: [ReadWriteOnce]
  resources: {requests: {storage: 5Gi}}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: cir-form-templates}
spec:
  accessModes: [ReadWriteMany]
  resources: {requests: {storage: 1Gi}}
