name: AGID compliance

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  agid-compliance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Configure local DNS resolver
        env:
          AGID_DNS_UPSTREAMS: "1.1.1.1 8.8.8.8"
        run: ./scripts/configure_local_dns.sh

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run AGID compliance suite with networked pip-audit
        env:
          AGID_USE_LOCAL_DNS: "1"
          AGID_PIP_AUDIT_STRICT: "1"
          AGID_LOCAL_DNS_STRICT: "1"
          AGID_PIP_AUDIT_TIMEOUT: "300"
        run: ./scripts/run_agid_compliance.sh

      - name: Upload AGID compliance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agid-compliance-evidence
          path: compliance/agid/*
