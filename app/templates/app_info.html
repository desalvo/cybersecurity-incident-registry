{% extends "base.html" %}
{% block content %}
<section class="card app-info-card" aria-labelledby="app-info-title">
  <h1 id="app-info-title">Applicazione</h1>
  <table class="detail-table app-info-table">
    <tbody>
      <tr><th>Nome</th><td>{{ app_info.name }}</td></tr>
      <tr><th>Versione applicativa</th><td>0.6.0-3</td></tr><tr><th>Descrizione versione</th><td>Versione applicativa: 0.6.0-3</td></tr>
      <tr><th>Build</th><td>{{ app_info.build }}</td></tr>
      <tr><th>Autore</th><td>{{ app_info.author }} &lt;<a href="mailto:{{ app_info.author_email }}">{{ app_info.author_email }}</a>&gt;</td></tr>
    </tbody>
  </table>
</section>
{% endblock %}
