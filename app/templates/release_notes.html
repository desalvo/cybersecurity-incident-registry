{% extends 'base.html' %}
{% block content %}
<div class="card doc-page release-notes-page" aria-labelledby="release-notes-title">
  <div class="page-header">
    <div>
      <h1 id="release-notes-title">Note di rilascio</h1>
      <p class="muted">Elenco sintetico degli aggiornamenti del pacchetto. Tutte le note sono raccolte in questo riquadro per mantenere la pagina omogenea e separata dalla documentazione operativa.</p>
    </div>
    <div class="button-row">
      <a class="button secondary" href="{{ url_for('main.release_notes_pdf') }}">Scarica PDF</a>
    </div>
  </div>
  <pre class="release-notes-text">{{ changelog }}</pre>
</div>
{% endblock %}
