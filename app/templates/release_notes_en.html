{% extends 'base.html' %}
{% block content %}
<div class="card doc-page release-notes-page" aria-labelledby="release-notes-title">
  <div class="page-header">
    <div>
      <h1 id="release-notes-title">Release notes</h1>
      <p class="muted">Summary of package updates. All entries are contained in this single panel to keep the page consistent and separate from operational documentation.</p>
    </div>
    <div class="button-row">
      <a class="button secondary" href="{{ url_for('main.release_notes_pdf') }}">Download PDF</a>
    </div>
  </div>
  <pre class="release-notes-text">{{ changelog }}</pre>
</div>
{% endblock %}
