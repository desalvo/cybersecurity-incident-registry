{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h2>CSV import</h2>
  <p class="muted">Importa un file CSV prodotto da “Export incidenti in CSV”. Gli incidenti importati verranno associati all’utente corrente.</p>
  <form method="post" enctype="multipart/form-data">
    <label>File CSV</label>
    <input type="file" name="file" accept=".csv,text/csv" required>
    <button type="submit">Importa CSV</button>
  </form>
</div>
{% endblock %}
