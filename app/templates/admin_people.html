{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h2>Personale configurabile</h2>
  <p class="muted">Aggiungi il personale fornendo nome ed email.</p>
  <form method="post" class="toolbar">
    <div><label>Nome</label><input name="name" required></div>
    <div><label>Email</label><input name="email" type="email"></div>
    <button>Aggiungi</button>
  </form>
</div>
<div class="card">
  <h3>Elenco personale</h3>
  <table class="table">
    <thead><tr><th>Nome</th><th>Email</th><th>Azioni</th></tr></thead>
    <tbody>
      {% for p in people %}
      <tr>
        <td>{{ p.name }}</td>
        <td>{{ p.email or '' }}</td>
        <td>
          <form method="post" action="{{ url_for('main.admin_people_delete', pid=p.id) }}" onsubmit="return confirm('Cancellare questa persona e rimuoverla dagli incidenti?')">
            <button class="danger" type="submit">Elimina</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="3" class="empty">Nessuna persona configurata.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
