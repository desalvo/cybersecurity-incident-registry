{% extends 'base.html' %}{% block content %}
{% macro info_label(text, help) -%}<span class="field-label-with-help"><span>{{ text }}</span><span class="info-icon" tabindex="0" role="img" aria-label="Info: {{ help }}" title="{{ help }}">ⓘ</span></span>{%- endmacro %}
<div class="card"><h2>Nuovo incidente</h2><form method="post"><div class="form-grid"><div class="wide"><label>{{ info_label('Nome', 'Nome dell’incidente, obbligatorio.') }}</label><input name="name" required></div><div class="wide"><label>{{ info_label('Riferimento', 'Riferimento dell’incidente, normalmente corrispondente all’utente che ha subito le conseguenze dell’incidente.') }}</label><input name="reference" placeholder="Campo opzionale"></div><div class="wide"><label>{{ info_label('Destinatario', 'Destinatario delle comunicazioni di questo incidente. Se il campo è vuoto il destinatario viene preso dal campo Riferimento.') }}</label><input name="recipient" placeholder="Campo opzionale; se vuoto usa Riferimento"></div><div class="wide"><label>{{ info_label('Descrizione', 'Descrizione sintetica dell’incidente, opzionale.') }}</label><textarea name="description"></textarea></div><div><label>{{ info_label('Gravità', 'Livello di gravità dell’incidente, scelta fra una delle opzioni presentate nella lista.') }}</label><select name="severity_id">{% for l in severities %}<option value="{{l.id}}">{{l.value}}</option>{% endfor %}</select></div><div><label>{{ info_label('Stato', 'Stato dell’incidente. Lo stato viene automaticamente impostato a chiuso quando si inserisce una azione di conclusione, se non ci sono avvisi procedurali attivi.') }}</label><select name="status"><option>aperto</option><option>in lavorazione</option><option>chiuso</option></select></div><div><label>{{ info_label('Data inizio', 'La data in cui la violazione ha avuto inizio. Generalmente non corrisponde alla data di conoscenza iniziale della violazione.') }}</label><input name="start_date" type="date" required></div><div><label>{{ info_label('Ora inizio', 'L’ora in cui la violazione ha avuto inizio. Generalmente non corrisponde all’ora di conoscenza iniziale della violazione.') }}</label><input name="start_time" type="time" required></div><div><label>{{ info_label('Data fine', 'La data in cui la violazione ha avuto fine; può essere valorizzata successivamente o automaticamente alla conclusione.') }}</label><input name="end_date" type="date"></div><div><label>{{ info_label('Ora fine', 'L’ora in cui la violazione ha avuto fine; può essere valorizzata successivamente o automaticamente alla conclusione.') }}</label><input name="end_time" type="time"></div><div><label><input type="checkbox" name="personal_data"> {{ info_label('Dati personali', 'Indica se l’incidente coinvolge dati personali e attiva le valutazioni procedurali correlate.') }}</label></div><div><label>{{ info_label('Numero di interessati', 'Numero o stima dei soggetti interessati dall’incidente.') }}</label><input name="data_subjects_count" placeholder="es. 25 utenti, circa 100 persone"></div><div class="wide"><label>{{ info_label('Volume dati', 'Descrivere quantità, tipologia o estensione dei dati coinvolti.') }}</label><textarea name="data_volume" placeholder="Descrivere quantità, tipologia o estensione dei dati coinvolti"></textarea></div></div>{% include 'dnd_fields.html' %}<button>Crea</button></form></div>{% endblock %}
