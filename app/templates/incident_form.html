{% extends 'base.html' %}{% block content %}<div class="card"><h2>Nuovo incidente</h2><form method="post"><div class="form-grid"><div class="wide"><label>Nome incidente</label><input name="name" required></div><div class="wide"><label>Riferimento</label><input name="reference" placeholder="Campo opzionale"></div><div class="wide"><label>Destinatario</label><input name="recipient" placeholder="Campo opzionale; se vuoto usa Riferimento"></div><div class="wide"><label>Descrizione</label><textarea name="description"></textarea></div><div><label>Gravità</label><select name="severity_id">{% for l in severities %}<option value="{{l.id}}">{{l.value}}</option>{% endfor %}</select></div><div><label>Stato</label><select name="status"><option>aperto</option><option>in lavorazione</option><option>chiuso</option></select></div><div><label>Data inizio</label><input name="start_date" type="date" required></div><div><label>Ora inizio</label><input name="start_time" type="time" required></div><div><label>Data fine</label><input name="end_date" type="date"></div><div><label>Ora fine</label><input name="end_time" type="time"></div><div><label><input type="checkbox" name="personal_data"> Dati personali</label></div><div><label>Numero di interessati</label><input name="data_subjects_count" placeholder="es. 25 utenti, circa 100 persone"></div><div class="wide"><label>Volume dati</label><textarea name="data_volume" placeholder="Descrivere quantità, tipologia o estensione dei dati coinvolti"></textarea></div></div>{% include 'dnd_fields.html' %}<button>Crea</button></form></div>{% endblock %}
